      <header>
        <div
          style="

          <button

          >

        </div>
        <p><a href="index.html" style="color: #3498db">← На главную</a></p>
      </header>

      <section class="lesson-content">
        <!-- содержание из твоего файла, оставляем как есть, структура правильная -->

    <!-- ===== ФОРМА ВХОДА ===== -->
    <div id="login-form" class="login-container">
      <div class="login-nav">
        <a href="index.html">🏠 На главную</a>
        <a href="urok-7.html">← Урок 7</a>
      </div>
      <h2>🔐 Эксклюзивный урок 8</h2>
      <p style="color: #7f8c8d; margin-bottom: 20px">
        Введите пароль, полученный от учителя
      </p>
      <input type="password" id="passwordInput" placeholder="Введите пароль" />
      <button onclick="checkPassword()">Войти</button>
      <div id="errorMessage" class="error-message">
        ❌ Неверный пароль. Попробуйте снова.
      </div>
    </div>

    <script>
      const encodedPassword = "RVNQODI2Nl9MaW5rXzIwMjUh";
      function checkPassword() {
        const input = document.getElementById("passwordInput");
        const error = document.getElementById("errorMessage");
        const loginForm = document.getElementById("login-form");
        const content = document.getElementById("protected-content");
        const correct = atob(encodedPassword);
        if (input.value === correct) {
          loginForm.style.display = "none";
          content.style.display = "block";
          sessionStorage.setItem("lesson8_access", "true");
        } else {
          error.style.display = "block";
          input.value = "";
          setTimeout(() => (error.style.display = "none"), 3000);
        }
      }
      window.onload = function () {
        if (sessionStorage.getItem("lesson8_access") === "true") {
          document.getElementById("login-form").style.display = "none";
          document.getElementById("protected-content").style.display = "block";
        }
      };
      document
        .getElementById("passwordInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") checkPassword();
        });
    </script>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
